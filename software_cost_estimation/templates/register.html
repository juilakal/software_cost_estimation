<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#818cf8">
    <meta name="description" content="Planix – Create your account">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <title>Register – Planix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="auth-body">
    <div class="auth-container">
        <!-- Left decorative panel -->
        <div class="auth-hero">
            <div class="hero-content">
                <div class="hero-icon">🚀</div>
                <h1>Plan<span class="accent">ix</span></h1>
                <p>Join thousands of project managers who estimate smarter, plan better.</p>
                <div class="hero-features">
                    <div class="feature-chip"><span>📐</span> COCOMO Model</div>
                    <div class="feature-chip"><span>🧮</span> FPA Analysis</div>
                    <div class="feature-chip"><span>📈</span> Trend Charts</div>
                </div>
            </div>
        </div>

        <!-- Register form -->
        <div class="auth-form-panel">
            <div class="auth-form-wrapper">
                <h2>Create account</h2>
                <p class="auth-subtitle">Get started with free cost estimations</p>

                <div id="error-msg" class="auth-error" style="display:none;"></div>
                <div id="success-msg" class="auth-success" style="display:none;"></div>

                <form id="register-form" onsubmit="handleRegister(event)">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                            <input type="text" id="username" placeholder="johndoe" required minlength="3">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                <polyline points="22,6 12,13 2,6" />
                            </svg>
                            <input type="email" id="email" placeholder="you@example.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                            <input type="password" id="password" placeholder="••••••••" required minlength="6">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="confirm-password">Confirm Password</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                            </svg>
                            <input type="password" id="confirm-password" placeholder="••••••••" required minlength="6">
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" id="register-btn">
                        <span class="btn-text">Create Account</span>
                        <span class="btn-loader" style="display:none;"></span>
                    </button>
                </form>

                <p class="auth-switch">
                    Already have an account? <a href="/login">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('token')) {
            window.location.href = '/';
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            const errBox = document.getElementById('error-msg');
            const successBox = document.getElementById('success-msg');
            errBox.style.display = 'none';
            successBox.style.display = 'none';

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (password !== confirm) {
                errBox.textContent = 'Passwords do not match';
                errBox.style.display = 'block';
                return;
            }

            btn.classList.add('loading');

            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        email: document.getElementById('email').value,
                        password
                    })
                });
                const data = await res.json();

                if (!res.ok) {
                    errBox.textContent = data.detail || 'Registration failed';
                    errBox.style.display = 'block';
                    btn.classList.remove('loading');
                    return;
                }

                successBox.textContent = 'Account created! Redirecting to login...';
                successBox.style.display = 'block';
                setTimeout(() => window.location.href = '/login', 1500);
            } catch (err) {
                errBox.textContent = 'Connection error. Is the server running?';
                errBox.style.display = 'block';
                btn.classList.remove('loading');
            }
        }

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(function (err) {
                console.log('SW registration failed:', err);
            });
        }
    </script>
</body>

</html>
