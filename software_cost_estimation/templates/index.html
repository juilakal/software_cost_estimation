<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#818cf8">
    <meta name="description" content="Planix – Software Cost Estimation Dashboard">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <title>Dashboard – Planix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body class="app-body">

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-left">
            <span class="nav-logo">📐 Plan<span class="accent">ix</span></span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link active">Dashboard</a>
            <a href="/history" class="nav-link">History</a>
        </div>
        <div class="nav-right">
            <span class="nav-user" id="nav-username"></span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="dashboard">
        <div class="dashboard-grid">

            <!-- Left: Estimation Form -->
            <section class="card form-card">
                <h2 class="card-title">New Estimation</h2>
                <p class="card-subtitle">Select a model and enter project parameters</p>

                <!-- Method Selector Tabs -->
                <div class="method-tabs">
                    <button class="tab active" data-method="cocomo" onclick="switchMethod('cocomo', this)">
                        <span class="tab-icon">🏗️</span> COCOMO
                    </button>
                    <button class="tab" data-method="fpa" onclick="switchMethod('fpa', this)">
                        <span class="tab-icon">🧮</span> FPA
                    </button>
                </div>

                <!-- COCOMO Fields -->
                <div id="cocomo-fields" class="method-fields">
                    <div class="input-group">
                        <label for="kloc">KLOC <span class="label-hint">(Thousands of Lines of Code)</span></label>
                        <input type="number" id="kloc" placeholder="e.g. 10" step="0.1" min="0" required>
                    </div>
                    <div class="input-group">
                        <label for="project_type">Project Type</label>
                        <select id="project_type">
                            <option value="organic">Organic</option>
                            <option value="semi">Semi-Detached</option>
                            <option value="embedded">Embedded</option>
                        </select>
                    </div>
                </div>

                <!-- FPA Fields -->
                <div id="fpa-fields" class="method-fields" style="display:none;">
                    <div class="input-group">
                        <label for="fp">Function Points</label>
                        <input type="number" id="fp" placeholder="e.g. 100" step="1" min="0" required>
                    </div>
                    <div class="input-group">
                        <label for="language">Programming Language</label>
                        <select id="language">
                            <option value="python">Python</option>
                            <option value="java">Java</option>
                            <option value="c">C</option>
                        </select>
                    </div>
                </div>

                <!-- Common field -->
                <div class="input-group">
                    <label for="cost_per_pm">Cost per Person-Month <span class="label-hint">(₹)</span></label>
                    <input type="number" id="cost_per_pm" placeholder="e.g. 50000" step="100" min="0" required>
                </div>

                <button class="btn-primary btn-calculate" onclick="calculate()">
                    <span class="btn-text">Calculate Estimation</span>
                    <span class="btn-loader" style="display:none;"></span>
                </button>

                <div id="error-box" class="form-error" style="display:none;"></div>
            </section>

            <!-- Right: Results -->
            <section class="card results-card" id="results-section" style="display:none;">
                <h2 class="card-title">📊 Estimation Results</h2>
                <p class="card-subtitle" id="result-method"></p>

                <!-- Stat Cards -->
                <div class="stats-grid">
                    <div class="stat-card stat-effort">
                        <div class="stat-icon">👥</div>
                        <div class="stat-info">
                            <span class="stat-label">Effort</span>
                            <span class="stat-value" id="res-effort">—</span>
                            <span class="stat-unit">Person-Months</span>
                        </div>
                    </div>
                    <div class="stat-card stat-time">
                        <div class="stat-icon">⏱️</div>
                        <div class="stat-info">
                            <span class="stat-label">Development Time</span>
                            <span class="stat-value" id="res-time">—</span>
                            <span class="stat-unit">Months</span>
                        </div>
                    </div>
                    <div class="stat-card stat-cost">
                        <div class="stat-icon">💰</div>
                        <div class="stat-info">
                            <span class="stat-label">Total Cost</span>
                            <span class="stat-value" id="res-cost">—</span>
                            <span class="stat-unit">INR</span>
                        </div>
                    </div>
                </div>

                <!-- Charts -->
                <div class="charts-row">
                    <div class="chart-container">
                        <h3 class="chart-title">Cost Breakdown</h3>
                        <canvas id="barChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <h3 class="chart-title">Distribution</h3>
                        <canvas id="doughnutChart"></canvas>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script src="/static/script.js"></script>
</body>

</html>
